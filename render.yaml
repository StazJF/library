services:
  - type: web
    name: snhs-library
    env: docker                        # ← Changed from php to docker
    dockerfilePath: ./Dockerfile       # ← Points to your Dockerfile
    buildCommand: ""                   # ← Let Dockerfile handle the build
    startCommand: ""                   # ← Let Dockerfile CMD handle this
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false                    # ← Set manually in Render dashboard
      - key: LOG_CHANNEL
        value: stack
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: true
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: lax
      - key: QUEUE_CONNECTION
        value: database

